version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: sales-os-postgres
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-sales_os}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - sales-os-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: sales-os-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - sales-os-network

  # Sales OS Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sales-os-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DATABASE_USER:-postgres}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME:-sales_os}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      
      # Anthropic
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      
      # Bird API
      BIRD_API_KEY: ${BIRD_API_KEY}
      BIRD_WORKSPACE_ID: ${BIRD_WORKSPACE_ID}
      BIRD_CHANNEL_ID: ${BIRD_CHANNEL_ID}
      BIRD_EMAIL_CHANNEL_ID: ${BIRD_EMAIL_CHANNEL_ID}
      
      # Brevo Email
      BREVO_API_KEY: ${BREVO_API_KEY}
      
      # SMTP
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      MAIL_FROM: ${MAIL_FROM}
      
      # App Config
      APP_URL: ${APP_URL:-https://automatizawpp.com}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}

      # Autenticação NextAuth
      AUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_URL: ${NEXTAUTH_URL:-https://automatizawpp.com}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://automatizawpp.com}
      
      # Compliance
      MAX_TOUCHES_PER_DAY: ${MAX_TOUCHES_PER_DAY:-5}
      QUIET_HOURS_START: ${QUIET_HOURS_START:-21}
      QUIET_HOURS_END: ${QUIET_HOURS_END:-9}
      WORKSPACE_TIMEZONE: ${WORKSPACE_TIMEZONE:-Europe/Madrid}
    ports:
      - "3000:3000"
    healthcheck:
      # Usando node em vez de curl — curl não existe em imagens Alpine
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - sales-os-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx Reverse Proxy (optional, for production)
  nginx:
    image: nginx:alpine
    container_name: sales-os-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - sales-os-network

volumes:
  postgres_data:
  redis_data:

networks:
  sales-os-network:
    driver: bridge
