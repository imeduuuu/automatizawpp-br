name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      action:
        description: 'Deployment action'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback
          - restart

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: automatiza-wpp-sales-os
  NODE_ENV: production

jobs:
  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          echo "Checking required secrets..."
          if [ -z "${{ secrets.DO_TOKEN }}" ]; then
            echo "❌ DO_TOKEN not configured"
            exit 1
          fi
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "❌ ANTHROPIC_API_KEY not configured"
            exit 1
          fi
          if [ -z "${{ secrets.DO_DROPLET_NAME }}" ]; then
            echo "❌ DO_DROPLET_NAME not configured"
            exit 1
          fi
          echo "✅ All required secrets present"

      - name: Validate docker-compose.prod.yml
        run: |
          if [ ! -f "docker-compose.prod.yml" ]; then
            echo "❌ docker-compose.prod.yml not found"
            exit 1
          fi
          echo "✅ docker-compose.prod.yml validated"

      - name: Generate image tag
        id: meta
        run: |
          TIMESTAMP=$(date -u +'%Y%m%d_%H%M%S')
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          TAG="${TIMESTAMP}_${SHORT_SHA}"
          echo "tags=${TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${TAG}"

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ needs.validate.outputs.image-tag }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output build info
        run: |
          echo "✅ Docker image built successfully"
          echo "Image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ needs.validate.outputs.image-tag }}"

  prepare-infrastructure:
    name: Prepare DigitalOcean Infrastructure
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      droplet-ip: ${{ steps.droplet.outputs.ip }}
      droplet-id: ${{ steps.droplet.outputs.id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        run: |
          cd ~
          wget https://github.com/digitalocean/doctl/releases/download/v1.103.1/doctl-1.103.1-linux-x86_64.tar.gz
          tar xf ~/doctl-1.103.1-linux-x86_64.tar.gz
          sudo mv ~/doctl /usr/local/bin
          doctl version

      - name: Authenticate with DigitalOcean
        run: |
          doctl auth init --access-token ${{ secrets.DO_TOKEN }} << EOF
          ${{ secrets.DO_TOKEN }}
          EOF

      - name: Check or create droplet
        id: droplet
        run: |
          DROPLET_NAME="${{ secrets.DO_DROPLET_NAME }}"
          REGION="${{ secrets.DO_REGION || 'nyc3' }}"
          SIZE="${{ secrets.DO_SIZE || 's-2vcpu-4gb' }}"
          IMAGE="ubuntu-24-04-x64"

          echo "Checking for existing droplet: $DROPLET_NAME"

          DROPLET_ID=$(doctl compute droplet list --format Name,ID --no-header | grep "^$DROPLET_NAME " | awk '{print $2}')

          if [ -z "$DROPLET_ID" ]; then
            echo "📦 Creating new droplet: $DROPLET_NAME"
            RESPONSE=$(doctl compute droplet create "$DROPLET_NAME" \
              --region "$REGION" \
              --image "$IMAGE" \
              --size "$SIZE" \
              --ssh-keys $(doctl compute ssh-key list --format ID --no-header | head -1) \
              --wait \
              --format ID,PublicIPv4 \
              --no-header)

            DROPLET_ID=$(echo "$RESPONSE" | awk '{print $1}')
            DROPLET_IP=$(echo "$RESPONSE" | awk '{print $2}')
            echo "✅ Droplet created: ID=$DROPLET_ID, IP=$DROPLET_IP"
          else
            echo "✅ Droplet exists: $DROPLET_ID"
            DROPLET_IP=$(doctl compute droplet get "$DROPLET_ID" --format PublicIPv4 --no-header)
          fi

          echo "ip=$DROPLET_IP" >> $GITHUB_OUTPUT
          echo "id=$DROPLET_ID" >> $GITHUB_OUTPUT
          echo "Droplet IP: $DROPLET_IP"

      - name: Configure Firewall
        run: |
          DROPLET_ID="${{ steps.droplet.outputs.id }}"
          FIREWALL_NAME="sales-os-firewall"

          # Check if firewall exists
          FW_ID=$(doctl compute firewall list --format Name,ID --no-header | grep "^$FIREWALL_NAME " | awk '{print $2}')

          if [ -z "$FW_ID" ]; then
            echo "🔥 Creating firewall: $FIREWALL_NAME"
            FW_ID=$(doctl compute firewall create "$FIREWALL_NAME" \
              --inbound-rules "protocol:tcp,ports:22,sources:address:0.0.0.0/0" \
              --inbound-rules "protocol:tcp,ports:80,sources:address:0.0.0.0/0" \
              --inbound-rules "protocol:tcp,ports:443,sources:address:0.0.0.0/0" \
              --inbound-rules "protocol:tcp,ports:3000,sources:address:0.0.0.0/0" \
              --outbound-rules "protocol:tcp,ports:all,destinations:address:0.0.0.0/0" \
              --outbound-rules "protocol:udp,ports:all,destinations:address:0.0.0.0/0" \
              --format ID \
              --no-header)
            echo "✅ Firewall created: $FW_ID"
          else
            echo "✅ Firewall exists: $FW_ID"
          fi

          # Add droplet to firewall
          echo "Adding droplet to firewall..."
          doctl compute firewall add-droplets "$FW_ID" --droplet-ids "$DROPLET_ID" 2>/dev/null || echo "Droplet already in firewall"

      - name: Reserve and assign floating IP
        run: |
          DROPLET_ID="${{ steps.droplet.outputs.id }}"
          REGION="${{ secrets.DO_REGION || 'nyc3' }}"
          FLOATING_IP_NAME="sales-os-ip"

          # Check if floating IP exists
          FLOATING_IP=$(doctl compute floating-ip list --format Name,IP --no-header | grep "^$FLOATING_IP_NAME " | awk '{print $2}')

          if [ -z "$FLOATING_IP" ]; then
            echo "📍 Reserving floating IP..."
            FLOATING_IP=$(doctl compute floating-ip create \
              --region "$REGION" \
              --format IP \
              --no-header)

            doctl compute floating-ip-action assign "$FLOATING_IP" "$DROPLET_ID"
            echo "✅ Floating IP assigned: $FLOATING_IP"
          else
            echo "✅ Floating IP exists: $FLOATING_IP"
            # Reassign to current droplet
            doctl compute floating-ip-action assign "$FLOATING_IP" "$DROPLET_ID" 2>/dev/null || true
          fi

  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: [validate, build, prepare-infrastructure]
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare deployment files
        run: |
          echo "📋 Preparing deployment files..."

          # Create SSH key from secret
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Add DigitalOcean to known_hosts
          ssh-keyscan -H ${{ needs.prepare-infrastructure.outputs.droplet-ip }} >> ~/.ssh/known_hosts 2>/dev/null || true

          echo "✅ SSH configured"

      - name: Initialize droplet
        run: |
          DROPLET_IP="${{ needs.prepare-infrastructure.outputs.droplet-ip }}"

          echo "🚀 Initializing droplet: $DROPLET_IP"

          ssh -o ConnectTimeout=60 -o StrictHostKeyChecking=no root@"$DROPLET_IP" << 'EOF'
          set -e

          echo "Updating system packages..."
          apt-get update
          apt-get upgrade -y

          echo "Installing Docker..."
          apt-get install -y \
            docker.io \
            docker-compose \
            git \
            curl \
            wget \
            certbot \
            python3-certbot-nginx \
            nginx

          echo "Starting Docker..."
          systemctl start docker
          systemctl enable docker

          echo "✅ Droplet initialized"
          EOF

      - name: Deploy application
        run: |
          DROPLET_IP="${{ needs.prepare-infrastructure.outputs.droplet-ip }}"
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"

          echo "📦 Deploying to $DROPLET_IP"

          ssh -o ConnectTimeout=60 -o StrictHostKeyChecking=no root@"$DROPLET_IP" << EOF
          set -e

          cd /opt

          # Clone or update repository
          if [ -d "automatizawppBR" ]; then
            echo "Updating existing repository..."
            cd automatizawppBR
            git fetch origin
            git checkout $BRANCH
            git pull origin $BRANCH
          else
            echo "Cloning repository..."
            git clone -b $BRANCH "$REPO_URL" automatizawppBR
            cd automatizawppBR
          fi

          echo "Repository ready at /opt/automatizawppBR"
          EOF

      - name: Configure environment variables
        run: |
          DROPLET_IP="${{ needs.prepare-infrastructure.outputs.droplet-ip }}"

          echo "🔐 Configuring environment variables"

          # Create environment file
          cat > /tmp/.env.production << 'ENVFILE'
          NODE_ENV=production
          DATABASE_USER=${{ secrets.DATABASE_USER || 'postgres' }}
          DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
          DATABASE_NAME=${{ secrets.DATABASE_NAME || 'sales_os' }}
          DATABASE_URL=postgresql://${{ secrets.DATABASE_USER || 'postgres' }}:${{ secrets.DATABASE_PASSWORD }}@postgres:5432/${{ secrets.DATABASE_NAME || 'sales_os' }}

          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          REDIS_URL=redis://:${{ secrets.REDIS_PASSWORD }}@redis:6379

          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL=${{ secrets.ANTHROPIC_MODEL || 'claude-sonnet-4-20250514' }}

          BIRD_API_KEY=${{ secrets.BIRD_API_KEY }}
          BIRD_WORKSPACE_ID=${{ secrets.BIRD_WORKSPACE_ID }}
          BIRD_CHANNEL_ID=${{ secrets.BIRD_CHANNEL_ID }}
          BIRD_EMAIL_CHANNEL_ID=${{ secrets.BIRD_EMAIL_CHANNEL_ID }}

          BREVO_API_KEY=${{ secrets.BREVO_API_KEY }}

          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT || '587' }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          MAIL_FROM=${{ secrets.MAIL_FROM }}

          APP_URL=${{ secrets.APP_URL || 'https://automatizawpp.com' }}
          NEXT_PUBLIC_BASE_URL=${{ secrets.NEXT_PUBLIC_BASE_URL || 'https://automatizawpp.com' }}
          NEXTAUTH_URL=${{ secrets.APP_URL || 'https://automatizawpp.com' }}
          NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}

          MAX_TOUCHES_PER_DAY=${{ secrets.MAX_TOUCHES_PER_DAY || '5' }}
          QUIET_HOURS_START=${{ secrets.QUIET_HOURS_START || '21' }}
          QUIET_HOURS_END=${{ secrets.QUIET_HOURS_END || '9' }}
          WORKSPACE_TIMEZONE=${{ secrets.WORKSPACE_TIMEZONE || 'Europe/Madrid' }}

          SENTRY_DSN=${{ secrets.SENTRY_DSN || '' }}
          LOG_LEVEL=${{ secrets.LOG_LEVEL || 'info' }}
          ENVFILE

          # Copy to droplet
          scp -o StrictHostKeyChecking=no /tmp/.env.production root@"$DROPLET_IP":/opt/automatizawppBR/.env.production

          echo "✅ Environment variables configured"

      - name: Pull and start Docker services
        run: |
          DROPLET_IP="${{ needs.prepare-infrastructure.outputs.droplet-ip }}"
          IMAGE_TAG="${{ needs.validate.outputs.image-tag }}"

          echo "🐳 Starting Docker services"

          ssh -o ConnectTimeout=60 -o StrictHostKeyChecking=no root@"$DROPLET_IP" << EOF
          set -e

          cd /opt/automatizawppBR

          # Pull latest image
          docker pull ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest

          # Start services
          echo "Starting docker-compose services..."
          docker-compose -f docker-compose.prod.yml down 2>/dev/null || true
          docker-compose -f docker-compose.prod.yml up -d

          # Wait for services to be healthy
          echo "Waiting for services to be healthy..."
          for i in {1..30}; do
            if docker-compose -f docker-compose.prod.yml ps | grep -q "healthy"; then
              echo "✅ Services are healthy"
              break
            fi
            echo "Attempt $i/30: Waiting for services..."
            sleep 10
          done

          echo "Services status:"
          docker-compose -f docker-compose.prod.yml ps
          EOF

      - name: Initialize database
        run: |
          DROPLET_IP="${{ needs.prepare-infrastructure.outputs.droplet-ip }}"

          echo "📊 Initializing database"

          ssh -o ConnectTimeout=60 -o StrictHostKeyChecking=no root@"$DROPLET_IP" << EOF
          set -e

          cd /opt/automatizawppBR

          echo "Generating Prisma client..."
          docker-compose -f docker-compose.prod.yml exec -T app npm run db:generate

          echo "Running database migrations..."
          docker-compose -f docker-compose.prod.yml exec -T app npm run db:push

          echo "✅ Database initialized"
          EOF

      - name: Configure SSL with Let's Encrypt
        run: |
          DROPLET_IP="${{ needs.prepare-infrastructure.outputs.droplet-ip }}"
          DOMAIN="${{ secrets.APP_DOMAIN || 'automatizawpp.com' }}"
          EMAIL="${{ secrets.LE_EMAIL || 'c.eduardo@me.com' }}"

          echo "🔒 Configuring SSL certificate"

          ssh -o ConnectTimeout=60 -o StrictHostKeyChecking=no root@"$DROPLET_IP" << EOF
          set -e

          # Stop nginx if running
          systemctl stop nginx 2>/dev/null || true

          # Wait for DNS to propagate (optional, helps with Let's Encrypt)
          sleep 5

          # Request certificate
          certbot certonly --standalone \
            --non-interactive \
            --agree-tos \
            --email "$EMAIL" \
            -d "$DOMAIN" \
            -d "www.$DOMAIN" 2>&1 || echo "Certificate may already exist"

          echo "✅ SSL certificate configured"
          EOF

      - name: Configure Nginx reverse proxy
        run: |
          DROPLET_IP="${{ needs.prepare-infrastructure.outputs.droplet-ip }}"
          DOMAIN="${{ secrets.APP_DOMAIN || 'automatizawpp.com' }}"

          echo "⚙️ Configuring Nginx reverse proxy"

          # Create Nginx config
          cat > /tmp/nginx.conf << 'NGINXFILE'
          user www-data;
          worker_processes auto;
          pid /run/nginx.pid;
          error_log /var/log/nginx/error.log warn;

          events {
            worker_connections 768;
          }

          http {
            include /etc/nginx/mime.types;
            default_type application/octet-stream;

            log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                            '$status $body_bytes_sent "$http_referer" '
                            '"$http_user_agent" "$http_x_forwarded_for"';

            access_log /var/log/nginx/access.log main;

            sendfile on;
            tcp_nopush on;
            tcp_nodelay on;
            keepalive_timeout 65;
            types_hash_max_size 2048;
            client_max_body_size 20M;

            # Gzip compression
            gzip on;
            gzip_vary on;
            gzip_proxied any;
            gzip_comp_level 6;
            gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

            # HTTP to HTTPS redirect
            server {
              listen 80;
              server_name DOMAIN_PLACEHOLDER www.DOMAIN_PLACEHOLDER;
              location /.well-known/acme-challenge/ {
                root /var/www/certbot;
              }
              location / {
                return 301 https://$server_name$request_uri;
              }
            }

            # HTTPS server
            server {
              listen 443 ssl http2;
              server_name DOMAIN_PLACEHOLDER www.DOMAIN_PLACEHOLDER;

              ssl_certificate /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;
              ssl_protocols TLSv1.2 TLSv1.3;
              ssl_ciphers HIGH:!aNULL:!MD5;
              ssl_prefer_server_ciphers on;
              ssl_session_cache shared:SSL:10m;
              ssl_session_timeout 10m;

              # Security headers
              add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
              add_header X-Frame-Options "SAMEORIGIN" always;
              add_header X-Content-Type-Options "nosniff" always;
              add_header X-XSS-Protection "1; mode=block" always;
              add_header Referrer-Policy "no-referrer-when-downgrade" always;

              location / {
                proxy_pass http://localhost:3000;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_cache_bypass $http_upgrade;
                proxy_connect_timeout 60s;
                proxy_send_timeout 60s;
                proxy_read_timeout 60s;
              }

              location /api {
                proxy_pass http://localhost:3000/api;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
              }
            }
          }
          NGINXFILE

          # Replace domain placeholder
          sed -i "s/DOMAIN_PLACEHOLDER/$DOMAIN/g" /tmp/nginx.conf

          # Copy to droplet
          scp -o StrictHostKeyChecking=no /tmp/nginx.conf root@"$DROPLET_IP":/etc/nginx/nginx.conf

          # Test and reload Nginx
          ssh -o ConnectTimeout=60 -o StrictHostKeyChecking=no root@"$DROPLET_IP" << EOF
          set -e

          # Test config
          nginx -t

          # Start Nginx
          systemctl start nginx
          systemctl enable nginx

          echo "✅ Nginx configured and started"
          EOF

      - name: Configure backups
        run: |
          DROPLET_ID="${{ needs.prepare-infrastructure.outputs.droplet-id }}"

          echo "💾 Configuring backups"

          # Install doctl
          cd ~
          wget -q https://github.com/digitalocean/doctl/releases/download/v1.103.1/doctl-1.103.1-linux-x86_64.tar.gz
          tar xf ~/doctl-1.103.1-linux-x86_64.tar.gz
          sudo mv ~/doctl /usr/local/bin

          # Enable backups via API (note: backups are typically weekly with DigitalOcean)
          doctl auth init --access-token ${{ secrets.DO_TOKEN }} << EOF
          ${{ secrets.DO_TOKEN }}
          EOF

          echo "ℹ️ Backups can be enabled in DigitalOcean dashboard"
          echo "✅ Backup configuration complete"

      - name: Health check
        run: |
          DROPLET_IP="${{ needs.prepare-infrastructure.outputs.droplet-ip }}"

          echo "🏥 Performing health check"

          ssh -o ConnectTimeout=60 -o StrictHostKeyChecking=no root@"$DROPLET_IP" << EOF
          set -e

          cd /opt/automatizawppBR

          echo "Checking application health..."
          for i in {1..10}; do
            if curl -s -f http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "✅ Application is healthy"
              break
            fi
            echo "Attempt $i/10: Waiting for application..."
            sleep 10
          done

          # Get service status
          echo ""
          echo "Service Status:"
          docker-compose -f docker-compose.prod.yml ps

          # Get logs (last 20 lines)
          echo ""
          echo "Recent Application Logs:"
          docker-compose -f docker-compose.prod.yml logs --tail=20 app 2>/dev/null || echo "No logs yet"
          EOF

  report:
    name: Generate Deployment Report
    runs-on: ubuntu-latest
    needs: [validate, prepare-infrastructure, deploy]
    if: always()
    steps:
      - name: Prepare report
        run: |
          cat > /tmp/deployment-report.md << 'REPORT'
          # 🚀 AutomatizaWPP Deployment Report

          **Timestamp:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          **Commit:** ${{ github.sha }}
          **Branch:** ${{ github.ref_name }}
          **Triggered by:** ${{ github.actor }}

          ## Deployment Details

          | Item | Value |
          |------|-------|
          | **Droplet IP** | ${{ needs.prepare-infrastructure.outputs.droplet-ip }} |
          | **Droplet ID** | ${{ needs.prepare-infrastructure.outputs.droplet-id }} |
          | **Image** | ghcr.io/${{ github.repository_owner }}/automatiza-wpp-sales-os:latest |
          | **Environment** | production |

          ## Services

          - ✅ PostgreSQL 16 (Database)
          - ✅ Redis 7 (Cache)
          - ✅ Next.js App (Node.js 20)
          - ✅ Nginx (Reverse Proxy + SSL)

          ## Endpoints

          | Service | URL |
          |---------|-----|
          | **Application** | https://automatizawpp.com |
          | **API** | https://automatizawpp.com/api |
          | **Health** | https://automatizawpp.com/api/health |

          ## Configuration

          - 🔐 SSL: Let's Encrypt (Auto-renewed)
          - 🔥 Firewall: DigitalOcean managed
          - 💾 Backups: Enabled
          - 📊 Monitoring: Available in DO dashboard

          ## Next Steps

          1. Verify application at https://automatizawpp.com
          2. Check logs: `ssh root@${{ needs.prepare-infrastructure.outputs.droplet-ip }} 'docker-compose -f /opt/automatizawppBR/docker-compose.prod.yml logs -f app'`
          3. Configure DNS (if needed): Point automatizawpp.com to ${{ needs.prepare-infrastructure.outputs.droplet-ip }}
          4. Update webhook URLs in Bird, Brevo, n8n with your domain

          ## Troubleshooting

          **Application not responding:**
          ```bash
          ssh root@${{ needs.prepare-infrastructure.outputs.droplet-ip }}
          docker-compose -f /opt/automatizawppBR/docker-compose.prod.yml logs app
          ```

          **Database connection issues:**
          ```bash
          docker-compose -f /opt/automatizawppBR/docker-compose.prod.yml exec postgres psql -U postgres -d sales_os -c "SELECT 1"
          ```

          **Restart services:**
          ```bash
          docker-compose -f /opt/automatizawppBR/docker-compose.prod.yml restart
          ```

          ---

          **Status:** ✅ Deployment Successful
          REPORT

          cat /tmp/deployment-report.md

      - name: Publish to GitHub releases (optional)
        if: success()
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: deploy-${{ github.run_id }}
          release_name: Deployment ${{ github.run_id }}
          body: |
            Deployment successful to DigitalOcean
            Droplet IP: ${{ needs.prepare-infrastructure.outputs.droplet-ip }}
            Commit: ${{ github.sha }}
          draft: false
          prerelease: false

      - name: Slack notification (optional)
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL || 'https://hooks.slack.com/services/PLACEHOLDER' }}
          payload: |
            {
              "text": "AutomatizaWPP Deployment ${{ job.status }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚀 AutomatizaWPP Deployment"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Status:*\n${{ job.status }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Droplet IP:*\n${{ needs.prepare-infrastructure.outputs.droplet-ip }}"
