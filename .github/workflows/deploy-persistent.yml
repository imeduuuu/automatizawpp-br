name: Deploy Persistent (Dual-Stack with Fallback)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Force deploy to all targets?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: automatiza-wpp-sales-os
  NODE_ENV: production

jobs:
  # ============================================================================
  # STAGE 1: Validação e Build
  # ============================================================================

  validate:
    name: Validate & Build
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          echo "Checking required secrets..."
          REQUIRED_SECRETS=(
            "DO_TOKEN"
            "DO_DROPLET_NAME"
            "ANTHROPIC_API_KEY"
            "DATABASE_PASSWORD"
            "REDIS_PASSWORD"
            "NEXTAUTH_SECRET"
            "DO_SSH_PRIVATE_KEY"
          )

          for secret in "${REQUIRED_SECRETS[@]}"; do
            if [ -z "$(eval echo \${{ secrets.$secret }})" ]; then
              echo "❌ Missing: $secret"
              exit 1
            fi
          done
          echo "✅ All required secrets present"

      - name: Generate image tag
        id: meta
        run: |
          TIMESTAMP=$(date -u +'%Y%m%d_%H%M%S')
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          TAG="${TIMESTAMP}_${SHORT_SHA}"
          echo "tags=${TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tags }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # STAGE 2: Preparar infraestrutura (DigitalOcean Primary)
  # ============================================================================

  prepare-primary:
    name: Prepare Primary (DigitalOcean - nyc3)
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      droplet-ip: ${{ steps.droplet.outputs.ip }}
      droplet-id: ${{ steps.droplet.outputs.id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        run: |
          cd ~
          wget -q https://github.com/digitalocean/doctl/releases/download/v1.103.1/doctl-1.103.1-linux-x86_64.tar.gz
          tar xf ~/doctl-1.103.1-linux-x86_64.tar.gz
          sudo mv ~/doctl /usr/local/bin

      - name: Authenticate with DigitalOcean
        run: |
          doctl auth init --access-token ${{ secrets.DO_TOKEN }} << EOF
          ${{ secrets.DO_TOKEN }}
          EOF

      - name: Check or create droplet
        id: droplet
        run: |
          DROPLET_NAME="${{ secrets.DO_DROPLET_NAME }}"
          REGION="nyc3"
          SIZE="s-2vcpu-4gb"

          DROPLET_ID=$(doctl compute droplet list --format Name,ID --no-header | grep "^$DROPLET_NAME " | awk '{print $2}')

          if [ -z "$DROPLET_ID" ]; then
            echo "📦 Creating droplet: $DROPLET_NAME"
            RESPONSE=$(doctl compute droplet create "$DROPLET_NAME" \
              --region "$REGION" \
              --image "ubuntu-24-04-x64" \
              --size "$SIZE" \
              --ssh-keys $(doctl compute ssh-key list --format ID --no-header | head -1) \
              --wait \
              --format ID,PublicIPv4 \
              --no-header)

            DROPLET_ID=$(echo "$RESPONSE" | awk '{print $1}')
            DROPLET_IP=$(echo "$RESPONSE" | awk '{print $2}')
          else
            DROPLET_IP=$(doctl compute droplet get "$DROPLET_ID" --format PublicIPv4 --no-header)
          fi

          echo "ip=$DROPLET_IP" >> $GITHUB_OUTPUT
          echo "id=$DROPLET_ID" >> $GITHUB_OUTPUT

      - name: Configure Firewall
        run: |
          DROPLET_ID="${{ steps.droplet.outputs.id }}"
          FW_NAME="sales-os-firewall"
          FW_ID=$(doctl compute firewall list --format Name,ID --no-header | grep "^$FW_NAME " | awk '{print $2}')

          if [ -z "$FW_ID" ]; then
            FW_ID=$(doctl compute firewall create "$FW_NAME" \
              --inbound-rules "protocol:tcp,ports:22,sources:address:0.0.0.0/0" \
              --inbound-rules "protocol:tcp,ports:80,sources:address:0.0.0.0/0" \
              --inbound-rules "protocol:tcp,ports:443,sources:address:0.0.0.0/0" \
              --inbound-rules "protocol:tcp,ports:3000,sources:address:0.0.0.0/0" \
              --outbound-rules "protocol:tcp,ports:all,destinations:address:0.0.0.0/0" \
              --outbound-rules "protocol:udp,ports:all,destinations:address:0.0.0.0/0" \
              --format ID --no-header)
          fi

          doctl compute firewall add-droplets "$FW_ID" --droplet-ids "$DROPLET_ID" 2>/dev/null || true

  # ============================================================================
  # STAGE 3: Deploy ao Primary (DigitalOcean)
  # ============================================================================

  deploy-primary:
    name: Deploy to Primary (DigitalOcean)
    runs-on: ubuntu-latest
    needs: [validate, prepare-primary]
    timeout-minutes: 35
    continue-on-error: true
    outputs:
      success: ${{ steps.health.outcome == 'success' }}
      ip: ${{ needs.prepare-primary.outputs.droplet-ip }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ needs.prepare-primary.outputs.droplet-ip }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Initialize droplet
        run: |
          ssh -o ConnectTimeout=60 -o StrictHostKeyChecking=no root@${{ needs.prepare-primary.outputs.droplet-ip }} << 'SSHEOF'
          set -e
          apt-get update >/dev/null 2>&1
          apt-get install -y docker.io docker-compose curl git >/dev/null 2>&1
          systemctl start docker
          systemctl enable docker
          echo "✅ Droplet initialized"
          SSHEOF

      - name: Deploy code
        run: |
          ssh -o ConnectTimeout=60 -o StrictHostKeyChecking=no root@${{ needs.prepare-primary.outputs.droplet-ip }} << 'SSHEOF'
          set -e
          cd /opt
          if [ -d "automatizawppBR" ]; then
            cd automatizawppBR && git fetch origin main && git checkout main && git pull origin main
          else
            git clone -b main https://github.com/${{ github.repository }}.git automatizawppBR
          fi
          echo "✅ Code deployed"
          SSHEOF

      - name: Configure environment
        run: |
          cat > /tmp/.env.production << 'ENVFILE'
          NODE_ENV=production
          DATABASE_USER=${{ secrets.DATABASE_USER || 'postgres' }}
          DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
          DATABASE_NAME=${{ secrets.DATABASE_NAME || 'sales_os' }}
          DATABASE_URL=postgresql://${{ secrets.DATABASE_USER || 'postgres' }}:${{ secrets.DATABASE_PASSWORD }}@postgres:5432/${{ secrets.DATABASE_NAME || 'sales_os' }}
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          REDIS_URL=redis://:${{ secrets.REDIS_PASSWORD }}@redis:6379
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL=${{ secrets.ANTHROPIC_MODEL || 'claude-sonnet-4-20250514' }}
          BIRD_API_KEY=${{ secrets.BIRD_API_KEY }}
          BIRD_WORKSPACE_ID=${{ secrets.BIRD_WORKSPACE_ID }}
          BIRD_CHANNEL_ID=${{ secrets.BIRD_CHANNEL_ID }}
          BIRD_EMAIL_CHANNEL_ID=${{ secrets.BIRD_EMAIL_CHANNEL_ID }}
          BREVO_API_KEY=${{ secrets.BREVO_API_KEY }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT || '587' }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          MAIL_FROM=${{ secrets.MAIL_FROM }}
          APP_URL=${{ secrets.APP_URL || 'https://automatizawpp.com' }}
          NEXT_PUBLIC_BASE_URL=${{ secrets.NEXT_PUBLIC_BASE_URL || 'https://automatizawpp.com' }}
          NEXTAUTH_URL=${{ secrets.APP_URL || 'https://automatizawpp.com' }}
          NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
          MAX_TOUCHES_PER_DAY=${{ secrets.MAX_TOUCHES_PER_DAY || '5' }}
          QUIET_HOURS_START=${{ secrets.QUIET_HOURS_START || '21' }}
          QUIET_HOURS_END=${{ secrets.QUIET_HOURS_END || '9' }}
          WORKSPACE_TIMEZONE=${{ secrets.WORKSPACE_TIMEZONE || 'Europe/Madrid' }}
          LOG_LEVEL=info
          ENVFILE

          scp -o StrictHostKeyChecking=no /tmp/.env.production root@${{ needs.prepare-primary.outputs.droplet-ip }}:/opt/automatizawppBR/.env.production

      - name: Start services
        run: |
          ssh -o ConnectTimeout=60 -o StrictHostKeyChecking=no root@${{ needs.prepare-primary.outputs.droplet-ip }} << 'SSHEOF'
          set -e
          cd /opt/automatizawppBR
          docker-compose -f docker-compose.prod.yml down 2>/dev/null || true
          docker-compose -f docker-compose.prod.yml up -d
          sleep 30
          docker-compose -f docker-compose.prod.yml exec -T app npm run db:generate || true
          docker-compose -f docker-compose.prod.yml exec -T app npm run db:push || true
          echo "✅ Services started"
          SSHEOF

      - name: Health check
        id: health
        run: |
          max_attempts=10
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            if ssh -o ConnectTimeout=60 -o StrictHostKeyChecking=no root@${{ needs.prepare-primary.outputs.droplet-ip }} \
              "curl -s -f http://localhost:3000/api/health > /dev/null" 2>/dev/null; then
              echo "✅ Primary deployment healthy"
              exit 0
            fi
            attempt=$((attempt + 1))
            echo "Health check attempt $attempt/$max_attempts..."
            sleep 10
          done
          echo "❌ Primary deployment health check failed"
          exit 1

  # ============================================================================
  # STAGE 4: Deploy ao Fallback (DigitalOcean Secondary)
  # ============================================================================

  deploy-fallback:
    name: Deploy to Fallback (DigitalOcean - lon1)
    runs-on: ubuntu-latest
    needs: [validate, deploy-primary]
    timeout-minutes: 35
    if: needs.deploy-primary.outputs.success == 'false'
    continue-on-error: true
    outputs:
      success: ${{ steps.health.outcome == 'success' }}
      ip: ${{ steps.droplet.outputs.ip }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        run: |
          cd ~
          wget -q https://github.com/digitalocean/doctl/releases/download/v1.103.1/doctl-1.103.1-linux-x86_64.tar.gz
          tar xf ~/doctl-1.103.1-linux-x86_64.tar.gz
          sudo mv ~/doctl /usr/local/bin

      - name: Authenticate with DigitalOcean
        run: |
          doctl auth init --access-token ${{ secrets.DO_TOKEN }} << EOF
          ${{ secrets.DO_TOKEN }}
          EOF

      - name: Create fallback droplet
        id: droplet
        run: |
          DROPLET_NAME="${{ secrets.DO_DROPLET_NAME }}-fallback"
          REGION="lon1"
          SIZE="s-2vcpu-4gb"

          DROPLET_ID=$(doctl compute droplet list --format Name,ID --no-header | grep "^$DROPLET_NAME " | awk '{print $2}')

          if [ -z "$DROPLET_ID" ]; then
            echo "📦 Creating fallback droplet: $DROPLET_NAME (region: $REGION)"
            RESPONSE=$(doctl compute droplet create "$DROPLET_NAME" \
              --region "$REGION" \
              --image "ubuntu-24-04-x64" \
              --size "$SIZE" \
              --ssh-keys $(doctl compute ssh-key list --format ID --no-header | head -1) \
              --wait \
              --format ID,PublicIPv4 \
              --no-header)

            DROPLET_ID=$(echo "$RESPONSE" | awk '{print $1}')
            DROPLET_IP=$(echo "$RESPONSE" | awk '{print $2}')
          else
            DROPLET_IP=$(doctl compute droplet get "$DROPLET_ID" --format PublicIPv4 --no-header)
          fi

          echo "ip=$DROPLET_IP" >> $GITHUB_OUTPUT
          echo "id=$DROPLET_ID" >> $GITHUB_OUTPUT

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ steps.droplet.outputs.ip }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Initialize droplet
        run: |
          ssh -o ConnectTimeout=60 -o StrictHostKeyChecking=no root@${{ steps.droplet.outputs.ip }} << 'SSHEOF'
          set -e
          apt-get update >/dev/null 2>&1
          apt-get install -y docker.io docker-compose curl git >/dev/null 2>&1
          systemctl start docker
          systemctl enable docker
          echo "✅ Fallback droplet initialized"
          SSHEOF

      - name: Deploy code
        run: |
          ssh -o ConnectTimeout=60 -o StrictHostKeyChecking=no root@${{ steps.droplet.outputs.ip }} << 'SSHEOF'
          set -e
          cd /opt
          git clone -b main https://github.com/${{ github.repository }}.git automatizawppBR
          echo "✅ Code deployed to fallback"
          SSHEOF

      - name: Configure environment
        run: |
          cat > /tmp/.env.production << 'ENVFILE'
          NODE_ENV=production
          DATABASE_USER=${{ secrets.DATABASE_USER || 'postgres' }}
          DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
          DATABASE_NAME=${{ secrets.DATABASE_NAME || 'sales_os' }}
          DATABASE_URL=postgresql://${{ secrets.DATABASE_USER || 'postgres' }}:${{ secrets.DATABASE_PASSWORD }}@postgres:5432/${{ secrets.DATABASE_NAME || 'sales_os' }}
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          REDIS_URL=redis://:${{ secrets.REDIS_PASSWORD }}@redis:6379
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL=${{ secrets.ANTHROPIC_MODEL || 'claude-sonnet-4-20250514' }}
          BIRD_API_KEY=${{ secrets.BIRD_API_KEY }}
          BIRD_WORKSPACE_ID=${{ secrets.BIRD_WORKSPACE_ID }}
          BIRD_CHANNEL_ID=${{ secrets.BIRD_CHANNEL_ID }}
          BIRD_EMAIL_CHANNEL_ID=${{ secrets.BIRD_EMAIL_CHANNEL_ID }}
          BREVO_API_KEY=${{ secrets.BREVO_API_KEY }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT || '587' }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          MAIL_FROM=${{ secrets.MAIL_FROM }}
          APP_URL=${{ secrets.APP_URL || 'https://automatizawpp.com' }}
          NEXT_PUBLIC_BASE_URL=${{ secrets.NEXT_PUBLIC_BASE_URL || 'https://automatizawpp.com' }}
          NEXTAUTH_URL=${{ secrets.APP_URL || 'https://automatizawpp.com' }}
          NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
          MAX_TOUCHES_PER_DAY=${{ secrets.MAX_TOUCHES_PER_DAY || '5' }}
          QUIET_HOURS_START=${{ secrets.QUIET_HOURS_START || '21' }}
          QUIET_HOURS_END=${{ secrets.QUIET_HOURS_END || '9' }}
          WORKSPACE_TIMEZONE=${{ secrets.WORKSPACE_TIMEZONE || 'Europe/Madrid' }}
          LOG_LEVEL=info
          ENVFILE

          scp -o StrictHostKeyChecking=no /tmp/.env.production root@${{ steps.droplet.outputs.ip }}:/opt/automatizawppBR/.env.production

      - name: Start services
        run: |
          ssh -o ConnectTimeout=60 -o StrictHostKeyChecking=no root@${{ steps.droplet.outputs.ip }} << 'SSHEOF'
          set -e
          cd /opt/automatizawppBR
          docker-compose -f docker-compose.prod.yml up -d
          sleep 30
          docker-compose -f docker-compose.prod.yml exec -T app npm run db:generate || true
          docker-compose -f docker-compose.prod.yml exec -T app npm run db:push || true
          echo "✅ Fallback services started"
          SSHEOF

      - name: Health check
        id: health
        run: |
          max_attempts=10
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            if ssh -o ConnectTimeout=60 -o StrictHostKeyChecking=no root@${{ steps.droplet.outputs.ip }} \
              "curl -s -f http://localhost:3000/api/health > /dev/null" 2>/dev/null; then
              echo "✅ Fallback deployment healthy"
              exit 0
            fi
            attempt=$((attempt + 1))
            echo "Health check attempt $attempt/$max_attempts..."
            sleep 10
          done
          echo "❌ Fallback deployment health check failed"
          exit 1

  # ============================================================================
  # STAGE 5: Notificações e Relatório
  # ============================================================================

  report:
    name: Generate Report
    runs-on: ubuntu-latest
    needs: [validate, deploy-primary, deploy-fallback]
    if: always()
    steps:
      - name: Determine status
        id: status
        run: |
          PRIMARY="${{ needs.deploy-primary.outputs.success }}"
          FALLBACK="${{ needs.deploy-fallback.outputs.success }}"
          PRIMARY_IP="${{ needs.deploy-primary.outputs.ip }}"
          FALLBACK_IP="${{ needs.deploy-fallback.outputs.ip }}"

          if [ "$PRIMARY" == "true" ]; then
            echo "status=✅ PRIMARY ACTIVE" >> $GITHUB_OUTPUT
            echo "active_ip=$PRIMARY_IP" >> $GITHUB_OUTPUT
            echo "mode=Single (Primary OK)" >> $GITHUB_OUTPUT
          elif [ "$FALLBACK" == "true" ]; then
            echo "status=⚠️ FALLBACK ACTIVE" >> $GITHUB_OUTPUT
            echo "active_ip=$FALLBACK_IP" >> $GITHUB_OUTPUT
            echo "mode=Dual (Primary failed)" >> $GITHUB_OUTPUT
          else
            echo "status=❌ CRITICAL FAILURE" >> $GITHUB_OUTPUT
            echo "active_ip=NONE" >> $GITHUB_OUTPUT
            echo "mode=Manual intervention required" >> $GITHUB_OUTPUT
          fi

      - name: Print report
        run: |
          cat << 'REPORT'
          ════════════════════════════════════════════════════════════════
          🚀 PERSISTENT DEPLOYMENT REPORT
          ════════════════════════════════════════════════════════════════

          STATUS: ${{ steps.status.outputs.status }}
          MODE:   ${{ steps.status.outputs.mode }}
          ACTIVE: ${{ steps.status.outputs.active_ip }}

          PRIMARY (nyc3)
          ├─ Status: ${{ needs.deploy-primary.outputs.success == 'true' && '✅ HEALTHY' || '❌ FAILED' }}
          └─ IP: ${{ needs.deploy-primary.outputs.ip }}

          FALLBACK (lon1)
          ├─ Status: ${{ needs.deploy-fallback.outputs.success == 'true' && '✅ ACTIVE' || '⏭️ NOT TRIGGERED' }}
          └─ IP: ${{ needs.deploy-fallback.outputs.ip }}

          ════════════════════════════════════════════════════════════════
          NEXT STEPS:
          1. Visit: https://automatizawpp.com
          2. If Fallback active: Update DNS to ${{ steps.status.outputs.active_ip }}
          3. Monitor: GitHub Actions / DigitalOcean Dashboard
          ════════════════════════════════════════════════════════════════
          REPORT

      - name: Fail if critical
        if: needs.deploy-primary.outputs.success != 'true' && needs.deploy-fallback.outputs.success != 'true'
        run: exit 1
