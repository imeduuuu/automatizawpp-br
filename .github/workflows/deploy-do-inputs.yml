name: Deploy to DigitalOcean (Manual with Inputs)

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'What to do?'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - restart
          - rollback
          - destroy
      droplet_size:
        description: 'Droplet size (if creating new)'
        required: false
        default: 's-2vcpu-4gb'
        type: choice
        options:
          - s-1vcpu-512mb-10gb
          - s-1vcpu-1gb-25gb
          - s-2vcpu-2gb-60gb
          - s-2vcpu-4gb-80gb
          - s-4vcpu-8gb-160gb
          - s-6vcpu-16gb-320gb
      region:
        description: 'DigitalOcean region'
        required: false
        default: 'nyc3'
        type: choice
        options:
          - nyc1
          - nyc3
          - sfo2
          - sfo3
          - lon1
          - ams3
          - fra1
          - blr1
          - sgp1
          - tor1
      app_url:
        description: 'Application URL (for SSL)'
        required: false
        default: 'https://automatizawpp.com'
      enable_backups:
        description: 'Enable backups?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      enable_monitoring:
        description: 'Enable DigitalOcean monitoring?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: automatiza-wpp-sales-os
  NODE_ENV: production

jobs:
  pre-deployment:
    name: Pre-Deployment Checks
    runs-on: ubuntu-latest
    outputs:
      should_proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate inputs and secrets
        id: check
        run: |
          echo "🔍 Validating deployment configuration..."

          ACTION="${{ github.event.inputs.action }}"
          echo "Action: $ACTION"

          # Check required secrets
          MISSING_SECRETS=""

          if [ -z "${{ secrets.DO_TOKEN }}" ]; then
            MISSING_SECRETS="$MISSING_SECRETS\n- DO_TOKEN"
          fi

          if [ -z "${{ secrets.DO_DROPLET_NAME }}" ]; then
            MISSING_SECRETS="$MISSING_SECRETS\n- DO_DROPLET_NAME"
          fi

          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            MISSING_SECRETS="$MISSING_SECRETS\n- ANTHROPIC_API_KEY"
          fi

          if [ -z "${{ secrets.DATABASE_PASSWORD }}" ]; then
            MISSING_SECRETS="$MISSING_SECRETS\n- DATABASE_PASSWORD"
          fi

          if [ -z "${{ secrets.REDIS_PASSWORD }}" ]; then
            MISSING_SECRETS="$MISSING_SECRETS\n- REDIS_PASSWORD"
          fi

          if [ -n "$MISSING_SECRETS" ]; then
            echo "❌ Missing required secrets:$MISSING_SECRETS"
            echo "proceed=false" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "✅ All required secrets configured"
          echo "proceed=true" >> $GITHUB_OUTPUT

  confirm-action:
    name: Confirm Deployment Action
    runs-on: ubuntu-latest
    needs: pre-deployment
    steps:
      - name: Display deployment summary
        run: |
          cat << EOF
          ═══════════════════════════════════════════════════════════
          📋 DEPLOYMENT CONFIGURATION SUMMARY
          ═══════════════════════════════════════════════════════════

          Action:               ${{ github.event.inputs.action }}
          Droplet Size:         ${{ github.event.inputs.droplet_size || 's-2vcpu-4gb' }}
          Region:               ${{ github.event.inputs.region || 'nyc3' }}
          App URL:              ${{ github.event.inputs.app_url }}
          Enable Backups:       ${{ github.event.inputs.enable_backups || 'true' }}
          Enable Monitoring:    ${{ github.event.inputs.enable_monitoring || 'true' }}

          Triggered by:         ${{ github.actor }}
          Repository:           ${{ github.repository }}
          Branch:               ${{ github.ref_name }}

          ═══════════════════════════════════════════════════════════
          EOF

  deploy:
    name: Execute Deployment
    runs-on: ubuntu-latest
    needs: [pre-deployment, confirm-action]
    if: needs.pre-deployment.outputs.should_proceed == 'true'
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          echo "📦 Installing doctl..."
          cd ~
          wget -q https://github.com/digitalocean/doctl/releases/download/v1.103.1/doctl-1.103.1-linux-x86_64.tar.gz
          tar xf ~/doctl-1.103.1-linux-x86_64.tar.gz
          sudo mv ~/doctl /usr/local/bin
          doctl version
          echo "✅ doctl installed"

      - name: Authenticate with DigitalOcean
        run: |
          doctl auth init --access-token "${{ secrets.DO_TOKEN }}" << EOF
          ${{ secrets.DO_TOKEN }}
          EOF

      - name: Handle action - Deploy
        if: github.event.inputs.action == 'deploy'
        run: |
          echo "🚀 Starting deployment..."

          DROPLET_NAME="${{ secrets.DO_DROPLET_NAME }}"
          REGION="${{ github.event.inputs.region || 'nyc3' }}"
          SIZE="${{ github.event.inputs.droplet_size || 's-2vcpu-4gb' }}"
          IMAGE="ubuntu-24-04-x64"

          # Check if droplet exists
          DROPLET_ID=$(doctl compute droplet list --format Name,ID --no-header 2>/dev/null | grep "^$DROPLET_NAME " | awk '{print $2}')

          if [ -z "$DROPLET_ID" ]; then
            echo "📦 Creating new droplet: $DROPLET_NAME"

            # Get SSH key ID
            SSH_KEY_ID=$(doctl compute ssh-key list --format ID --no-header | head -1)

            if [ -z "$SSH_KEY_ID" ]; then
              echo "❌ No SSH key found. Add SSH key to DigitalOcean first."
              exit 1
            fi

            RESPONSE=$(doctl compute droplet create "$DROPLET_NAME" \
              --region "$REGION" \
              --image "$IMAGE" \
              --size "$SIZE" \
              --ssh-keys "$SSH_KEY_ID" \
              --wait \
              --format ID,PublicIPv4 \
              --no-header)

            DROPLET_ID=$(echo "$RESPONSE" | awk '{print $1}')
            DROPLET_IP=$(echo "$RESPONSE" | awk '{print $2}')

            echo "✅ Droplet created!"
            echo "   ID: $DROPLET_ID"
            echo "   IP: $DROPLET_IP"
          else
            echo "✅ Using existing droplet: $DROPLET_ID"
            DROPLET_IP=$(doctl compute droplet get "$DROPLET_ID" --format PublicIPv4 --no-header)
            echo "   IP: $DROPLET_IP"
          fi

          # Save for next steps
          echo "DROPLET_ID=$DROPLET_ID" >> $GITHUB_ENV
          echo "DROPLET_IP=$DROPLET_IP" >> $GITHUB_ENV

      - name: Handle action - Restart
        if: github.event.inputs.action == 'restart'
        run: |
          echo "🔄 Restarting application..."

          DROPLET_NAME="${{ secrets.DO_DROPLET_NAME }}"
          DROPLET_ID=$(doctl compute droplet list --format Name,ID --no-header | grep "^$DROPLET_NAME " | awk '{print $2}')

          if [ -z "$DROPLET_ID" ]; then
            echo "❌ Droplet not found: $DROPLET_NAME"
            exit 1
          fi

          DROPLET_IP=$(doctl compute droplet get "$DROPLET_ID" --format PublicIPv4 --no-header)

          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh -o ConnectTimeout=60 -o StrictHostKeyChecking=no root@"$DROPLET_IP" << 'EOF'
          set -e
          cd /opt/automatizawppBR
          echo "Restarting services..."
          docker-compose -f docker-compose.prod.yml restart
          echo "✅ Services restarted"
          EOF

          echo "DROPLET_ID=$DROPLET_ID" >> $GITHUB_ENV
          echo "DROPLET_IP=$DROPLET_IP" >> $GITHUB_ENV

      - name: Handle action - Rollback
        if: github.event.inputs.action == 'rollback'
        run: |
          echo "⏮️ Rolling back to previous version..."

          DROPLET_NAME="${{ secrets.DO_DROPLET_NAME }}"
          DROPLET_ID=$(doctl compute droplet list --format Name,ID --no-header | grep "^$DROPLET_NAME " | awk '{print $2}')

          if [ -z "$DROPLET_ID" ]; then
            echo "❌ Droplet not found: $DROPLET_NAME"
            exit 1
          fi

          DROPLET_IP=$(doctl compute droplet get "$DROPLET_ID" --format PublicIPv4 --no-header)

          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh -o ConnectTimeout=60 -o StrictHostKeyChecking=no root@"$DROPLET_IP" << 'EOF'
          set -e
          cd /opt/automatizawppBR

          echo "Rolling back to previous Docker image..."
          # Note: This requires having previous images available
          docker-compose -f docker-compose.prod.yml down
          docker system prune -f
          docker pull ghcr.io/**/automatiza-wpp-sales-os:latest
          docker-compose -f docker-compose.prod.yml up -d

          echo "✅ Rollback complete"
          EOF

          echo "DROPLET_ID=$DROPLET_ID" >> $GITHUB_ENV
          echo "DROPLET_IP=$DROPLET_IP" >> $GITHUB_ENV

      - name: Handle action - Destroy
        if: github.event.inputs.action == 'destroy'
        run: |
          echo "⚠️ DESTROYING droplet..."

          DROPLET_NAME="${{ secrets.DO_DROPLET_NAME }}"
          DROPLET_ID=$(doctl compute droplet list --format Name,ID --no-header | grep "^$DROPLET_NAME " | awk '{print $2}')

          if [ -z "$DROPLET_ID" ]; then
            echo "ℹ️ Droplet not found (already destroyed)"
            exit 0
          fi

          echo "Destroying droplet: $DROPLET_ID"
          doctl compute droplet delete "$DROPLET_ID" --force

          echo "✅ Droplet destroyed"

      - name: Configure firewall
        if: github.event.inputs.action == 'deploy'
        run: |
          DROPLET_ID=${{ env.DROPLET_ID }}
          FIREWALL_NAME="sales-os-firewall"

          FW_ID=$(doctl compute firewall list --format Name,ID --no-header 2>/dev/null | grep "^$FIREWALL_NAME " | awk '{print $2}')

          if [ -z "$FW_ID" ]; then
            echo "🔥 Creating firewall..."
            FW_ID=$(doctl compute firewall create "$FIREWALL_NAME" \
              --inbound-rules "protocol:tcp,ports:22,sources:address:0.0.0.0/0" \
              --inbound-rules "protocol:tcp,ports:80,sources:address:0.0.0.0/0" \
              --inbound-rules "protocol:tcp,ports:443,sources:address:0.0.0.0/0" \
              --inbound-rules "protocol:tcp,ports:3000,sources:address:0.0.0.0/0" \
              --outbound-rules "protocol:tcp,ports:all,destinations:address:0.0.0.0/0" \
              --outbound-rules "protocol:udp,ports:all,destinations:address:0.0.0.0/0" \
              --format ID \
              --no-header)
          fi

          doctl compute firewall add-droplets "$FW_ID" --droplet-ids "$DROPLET_ID" 2>/dev/null || true
          echo "✅ Firewall configured"

      - name: Setup droplet (first run)
        if: github.event.inputs.action == 'deploy'
        run: |
          DROPLET_IP=${{ env.DROPLET_IP }}

          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$DROPLET_IP" >> ~/.ssh/known_hosts 2>/dev/null || true

          echo "⚙️ Setting up droplet: $DROPLET_IP"

          # Wait for droplet to be ready
          sleep 15

          ssh -o ConnectTimeout=60 -o StrictHostKeyChecking=no root@"$DROPLET_IP" << 'EOF'
          set -e

          echo "Updating system..."
          apt-get update
          apt-get upgrade -y

          echo "Installing Docker..."
          apt-get install -y docker.io docker-compose git curl wget certbot python3-certbot-nginx nginx

          echo "Starting services..."
          systemctl start docker
          systemctl enable docker

          echo "✅ Droplet ready"
          EOF

      - name: Deploy code
        if: github.event.inputs.action == 'deploy'
        run: |
          DROPLET_IP=${{ env.DROPLET_IP }}

          ssh -o ConnectTimeout=60 -o StrictHostKeyChecking=no root@"$DROPLET_IP" << 'EOF'
          set -e

          cd /opt

          if [ -d "automatizawppBR" ]; then
            echo "Updating repository..."
            cd automatizawppBR
            git fetch origin main
            git checkout main
            git pull origin main
          else
            echo "Cloning repository..."
            git clone -b main https://github.com/${{ github.repository }}.git automatizawppBR
            cd automatizawppBR
          fi

          echo "✅ Code deployed"
          EOF

      - name: Configure environment
        if: github.event.inputs.action == 'deploy'
        run: |
          DROPLET_IP=${{ env.DROPLET_IP }}

          cat > /tmp/.env.production << 'ENVFILE'
          NODE_ENV=production
          DATABASE_USER=${{ secrets.DATABASE_USER || 'postgres' }}
          DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
          DATABASE_NAME=${{ secrets.DATABASE_NAME || 'sales_os' }}
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL=${{ secrets.ANTHROPIC_MODEL || 'claude-sonnet-4-20250514' }}
          BIRD_API_KEY=${{ secrets.BIRD_API_KEY }}
          BIRD_WORKSPACE_ID=${{ secrets.BIRD_WORKSPACE_ID }}
          BIRD_CHANNEL_ID=${{ secrets.BIRD_CHANNEL_ID }}
          BIRD_EMAIL_CHANNEL_ID=${{ secrets.BIRD_EMAIL_CHANNEL_ID }}
          BREVO_API_KEY=${{ secrets.BREVO_API_KEY }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT || '587' }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          MAIL_FROM=${{ secrets.MAIL_FROM }}
          APP_URL=${{ github.event.inputs.app_url }}
          NEXT_PUBLIC_BASE_URL=${{ github.event.inputs.app_url }}
          NEXTAUTH_URL=${{ github.event.inputs.app_url }}
          NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
          MAX_TOUCHES_PER_DAY=${{ secrets.MAX_TOUCHES_PER_DAY || '5' }}
          QUIET_HOURS_START=${{ secrets.QUIET_HOURS_START || '21' }}
          QUIET_HOURS_END=${{ secrets.QUIET_HOURS_END || '9' }}
          WORKSPACE_TIMEZONE=${{ secrets.WORKSPACE_TIMEZONE || 'Europe/Madrid' }}
          LOG_LEVEL=info
          ENVFILE

          scp -o StrictHostKeyChecking=no /tmp/.env.production root@"$DROPLET_IP":/opt/automatizawppBR/.env.production

          echo "✅ Environment configured"

      - name: Start services
        if: github.event.inputs.action == 'deploy'
        run: |
          DROPLET_IP=${{ env.DROPLET_IP }}

          ssh -o ConnectTimeout=60 -o StrictHostKeyChecking=no root@"$DROPLET_IP" << 'EOF'
          set -e
          cd /opt/automatizawppBR

          echo "Starting services..."
          docker-compose -f docker-compose.prod.yml down 2>/dev/null || true
          docker-compose -f docker-compose.prod.yml up -d

          echo "Waiting for services..."
          sleep 20

          docker-compose -f docker-compose.prod.yml exec -T app npm run db:generate || true
          docker-compose -f docker-compose.prod.yml exec -T app npm run db:push || true

          echo "✅ Services started"
          EOF

      - name: Configure SSL
        if: github.event.inputs.action == 'deploy'
        run: |
          DROPLET_IP=${{ env.DROPLET_IP }}
          DOMAIN=$(echo "${{ github.event.inputs.app_url }}" | sed 's|https://||' | sed 's|http://||' | cut -d'/' -f1)

          ssh -o ConnectTimeout=60 -o StrictHostKeyChecking=no root@"$DROPLET_IP" << EOF
          set -e

          certbot certonly --standalone \
            --non-interactive \
            --agree-tos \
            --email "${{ secrets.LE_EMAIL || 'c.eduardo@me.com' }}" \
            -d "$DOMAIN" 2>&1 || echo "Certificate exists"

          echo "✅ SSL configured"
          EOF

      - name: Health check
        if: github.event.inputs.action == 'deploy' || github.event.inputs.action == 'restart'
        run: |
          DROPLET_IP=${{ env.DROPLET_IP }}

          ssh -o ConnectTimeout=60 -o StrictHostKeyChecking=no root@"$DROPLET_IP" << 'EOF'
          set -e

          echo "🏥 Health check..."
          for i in {1..10}; do
            if curl -s -f http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "✅ Application is healthy"
              exit 0
            fi
            echo "Attempt $i/10..."
            sleep 10
          done

          echo "⚠️ Health check timeout (may still be initializing)"
          EOF

      - name: Generate summary
        if: always()
        run: |
          cat << EOF
          ═══════════════════════════════════════════════════════════
          ✅ DEPLOYMENT SUMMARY
          ═══════════════════════════════════════════════════════════

          Action:         ${{ github.event.inputs.action }}
          Status:         ${{ job.status }}
          Droplet IP:     ${{ env.DROPLET_IP }}
          Droplet ID:     ${{ env.DROPLET_ID }}
          Timestamp:      $(date -u +'%Y-%m-%d %H:%M:%S UTC')

          Next Steps:
          1. Visit: ${{ github.event.inputs.app_url }}
          2. SSH:   ssh root@${{ env.DROPLET_IP }}
          3. Logs:  docker-compose -f /opt/automatizawppBR/docker-compose.prod.yml logs -f

          ═══════════════════════════════════════════════════════════
          EOF
